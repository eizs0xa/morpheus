name: Jira Smart Commits
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  preview-transitions:
    name: Preview Jira Smart Commit transitions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PROJECT_KEY: "EXAMPLE"
      JIRA_SITE: ""
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse Smart Commit trailers
        id: parse
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          echo "Parsing commits between ${base_sha}..${head_sha}"

          # Extract every line of the form:  Jira: <KEY>-<NNNN> #<transition>
          git log --format=%B "${base_sha}..${head_sha}" \
            | grep -E "^Jira: ${PROJECT_KEY}-[0-9]+ #[a-z_]+" \
            | sort -u \
            > trailers.txt || true

          count=$(wc -l < trailers.txt | tr -d ' ')
          echo "count=${count}" >> "${GITHUB_OUTPUT}"
          echo "Found ${count} Smart Commit trailer(s)."
          cat trailers.txt || true

      - name: Comment on PR with transition preview
        if: steps.parse.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = [
              '### Jira Smart Commit transitions (preview)',
              '',
              'On merge, the following transitions will be applied:',
              '',
              '```',
              fs.readFileSync('trailers.txt', 'utf8').trim(),
              '```',
              '',
              'Transition keys are resolved via `jira-transition-map.yaml`.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
