name: agent-pr-gate-python

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  gate:
    name: Python PR Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHON_VERSION: "3.12"
      PACKAGE_MANAGER: "pip"
      TEST_RUNNER: "pytest"
      LINTER: "ruff"
      COVERAGE_MIN: "80"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          case "pip" in
            pip)
              if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
              if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
              pip install "ruff" black pytest pytest-cov
              ;;
            poetry)
              pip install poetry
              poetry install --with dev --no-interaction --no-root
              ;;
            uv)
              pip install uv
              uv sync --all-extras --dev
              ;;
            *)
              echo "Unknown package manager: pip" && exit 1
              ;;
          esac

      - name: Format check
        run: black --check .

      - name: Lint
        run: |
          case "ruff" in
            ruff)   ruff check . ;;
            flake8) flake8 . ;;
            *) echo "Unknown linter: ruff" && exit 1 ;;
          esac

      - name: Test with coverage
        run: |
          case "pytest" in
            pytest)
              pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=${COVERAGE_MIN}
              ;;
            unittest)
              python -m unittest discover -s tests -v
              ;;
            *) echo "Unknown test runner: pytest" && exit 1 ;;
          esac

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          if-no-files-found: ignore
