name: git-github
version: 0.1.0
description: >-
  GitHub git-provider integration. Ships PR-gate, merge-queue, and release-train
  workflows plus PR template, CODEOWNERS template, and branch-protection JSON
  consumable by `gh api`.
requires:
  - name: core
    version_range: ">=0.1.0 <1.0.0"
incompatible_with:
  - git-gitlab
  - git-bitbucket
contributes:
  skills:
    - skills/branch-naming.md
    - skills/conventional-commits.md
  workflows:
    - workflows/agent-pr-gate.yml.tmpl
    - workflows/merge-queue.yml.tmpl
    - workflows/release-train.yml.tmpl
    - workflows/commit-lint.yml.tmpl
    - workflows/branch-name-check.yml.tmpl
  templates:
    - templates/pull_request_template.md.tmpl
    - templates/CODEOWNERS.tmpl
    - templates/branch-protection.json
    - templates/commitlint.config.cjs.tmpl
  hooks: []
  schemas: []
  instructions: []
prompts:
  - name: release_cadence
    question: "Release cadence"
    default: "biweekly"
    choices:
      - weekly
      - biweekly
      - monthly
  - name: default_branch
    question: "Default branch name"
    default: "main"
  - name: merge_queue_enabled
    question: "Enable GitHub merge queue?"
    default: true
  - name: branch_prefix_pattern
    question: "Branch prefix regex (e.g. '^(feat|fix|chore|docs)/' or '^[A-Z]+-[0-9]+')"
    default: "^(feat|fix|chore|docs|refactor|test|style)/"
  - name: conventional_commits_enforced
    question: "Enforce Conventional Commits on PR titles and commits?"
    default: true
detection:
  file_markers:
    - .github/
