name: pm-jira
version: 0.1.0
description: >-
  Jira project-management integration. Provides a Jira MCP server config, a
  ticket-syncer skill (ticket -> branch -> Smart Commit -> transition), branch
  and smart-commit enforcement workflows, a Jira status-transition map, and a
  preflight initiative-link warning.
requires:
  - name: core
    version_range: ">=0.1.0 <1.0.0"
incompatible_with:
  - pm-linear
contributes:
  skills:
    - skills/ticket-syncer-jira.md
    - skills/story-emitter.md
  workflows:
    - workflows/jira-branch-check.yml.tmpl
    - workflows/jira-smart-commits.yml.tmpl
    - workflows/jira-story-sync.yml.tmpl
  templates:
    - mcp-config.json.tmpl
    - templates/jira-transition-map.yaml.tmpl
    - templates/jira-story.md.tmpl
  hooks: []
  schemas: []
  instructions: []
prompts:
  - name: jira_project_key
    question: "Jira project key (e.g. PROJ)"
    default: ""
  - name: jira_site_url
    question: "Jira site URL (e.g. company.atlassian.net)"
    default: ""
  - name: initiative_key
    question: "Parent Jira Initiative key (optional, leave blank to skip)"
    default: ""
  - name: risk_tier_field
    question: "Custom field ID for risk_tier (optional)"
    default: ""
  - name: agent_registry_field
    question: "Custom field ID for agent_registry_id (optional)"
    default: ""
  - name: auto_emit_stories_from_tasks
    question: "Automatically emit Jira stories from tasks.md on spec finalize?"
    default: true
detection: {}
